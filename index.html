<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>うんこタワー 〜目指せ1000段〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#4a2c17;
    --cream:#fff6e3;
    --accent:#ff8a3d;
    --gold:#f5c518;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#ffe9c7;
    font-family:'Zen Maru Gothic','Hiragino Maru Gothic ProN',sans-serif;color:var(--ink);
    touch-action:manipulation; user-select:none;-webkit-user-select:none;}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:pointer;}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;pointer-events:none;display:none;}
  #count{
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    font-family:'Mochiy Pop One',sans-serif;font-size:clamp(34px,7vw,56px);
    color:#fff;text-shadow:0 3px 0 var(--ink), 0 6px 14px rgba(74,44,23,.35);
    letter-spacing:.02em;line-height:1;
  }
  #count small{font-size:.45em;}
  #tier{
    position:absolute;top:calc(14px + clamp(38px,7.5vw,60px));left:50%;transform:translateX(-50%);
    font-weight:900;font-size:clamp(13px,2.6vw,17px);color:var(--ink);
    background:rgba(255,255,255,.85);padding:3px 14px;border-radius:999px;
    border:2px solid var(--ink);box-shadow:0 3px 0 rgba(74,44,23,.25);white-space:nowrap;
  }
  #lives{position:absolute;top:14px;left:14px;font-size:clamp(20px,4.5vw,28px);letter-spacing:2px;filter:drop-shadow(0 2px 0 rgba(74,44,23,.3));}
  #lives .lost{filter:grayscale(1);opacity:.35;}
  #windbox{
    position:absolute;top:14px;right:14px;text-align:right;
    background:rgba(255,255,255,.82);border:2px solid var(--ink);border-radius:14px;
    padding:6px 10px;min-width:104px;box-shadow:0 3px 0 rgba(74,44,23,.25);
  }
  #windbox .lbl{font-size:11px;font-weight:900;letter-spacing:.15em;}
  #windarrow{font-size:20px;line-height:1.1;font-weight:900;}
  #windbar{height:6px;border-radius:99px;background:#e8dcc8;margin-top:4px;overflow:hidden;position:relative;}
  #windfill{position:absolute;top:0;bottom:0;left:50%;background:#3fa7d6;border-radius:99px;}
  /* balance meter */
  #balwrap{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);width:min(60vw,300px);text-align:center;}
  #balwrap .lbl{font-size:11px;font-weight:900;letter-spacing:.2em;margin-bottom:3px;color:var(--ink);text-shadow:0 1px 0 #fff;}
  #balbar{height:12px;border-radius:99px;background:rgba(255,255,255,.85);border:2px solid var(--ink);position:relative;overflow:hidden;}
  #balbar::after{content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(74,44,23,.4);}
  #baldot{position:absolute;top:1px;width:14px;height:6px;border-radius:99px;background:var(--accent);transition:left .15s ease, background .2s;}
  /* progress to next color */
  #nextwrap{position:absolute;bottom:54px;left:50%;transform:translateX(-50%);width:min(46vw,220px);}
  #nextbar{height:7px;border-radius:99px;background:rgba(255,255,255,.7);border:1.5px solid var(--ink);overflow:hidden;}
  #nextfill{height:100%;background:var(--gold);width:0%;}
  #nextlbl{font-size:10px;font-weight:700;text-align:center;margin-top:2px;color:var(--ink);text-shadow:0 1px 0 #fff;}

  #toast{
    position:absolute;top:34%;left:50%;transform:translate(-50%,-50%) scale(0);
    font-family:'Mochiy Pop One',sans-serif;font-size:clamp(26px,6vw,44px);
    color:#fff;text-shadow:0 3px 0 var(--ink),0 6px 16px rgba(0,0,0,.25);
    white-space:nowrap;pointer-events:none;
  }
  #toast.pop{animation:toastpop 1.1s cubic-bezier(.2,1.6,.4,1) forwards;}
  @keyframes toastpop{
    0%{transform:translate(-50%,-50%) scale(0) rotate(-8deg);}
    35%{transform:translate(-50%,-50%) scale(1.08) rotate(2deg);}
    70%{transform:translate(-50%,-50%) scale(1);opacity:1;}
    100%{transform:translate(-50%,-62%) scale(1);opacity:0;}
  }

  #mute{position:fixed;bottom:14px;right:14px;z-index:30;pointer-events:auto;
    width:44px;height:44px;border-radius:50%;border:2px solid var(--ink);
    background:rgba(255,255,255,.85);font-size:20px;cursor:pointer;box-shadow:0 3px 0 rgba(74,44,23,.3);}

  /* ---------- overlays ---------- */
  .ov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;z-index:20;padding:24px;}
  .hidden{display:none !important;}
  #title{background:radial-gradient(ellipse at 50% 30%, rgba(255,255,255,.55), rgba(255,233,199,0) 60%);}
  .bigtitle{
    font-family:'Mochiy Pop One',sans-serif;font-size:clamp(44px,11vw,92px);line-height:1.05;
    color:#a4652f;
    text-shadow:0 4px 0 #4a2c17, 0 9px 0 rgba(74,44,23,.18), 0 14px 30px rgba(74,44,23,.35);
    transform:rotate(-3deg);margin-bottom:6px;
  }
  .bigtitle .y2{display:block;font-size:.42em;color:#fff;letter-spacing:.25em;transform:rotate(1.5deg);}
  .subtitle{font-weight:900;font-size:clamp(14px,3vw,19px);margin:14px 0 4px;background:#fff;border:2px solid var(--ink);
    padding:6px 18px;border-radius:999px;box-shadow:0 3px 0 rgba(74,44,23,.25);transform:rotate(-1deg);}
  .rules{font-size:clamp(12px,2.6vw,15px);font-weight:700;line-height:2;margin:10px 0 6px;color:#6b4a2c;}
  .btn{
    pointer-events:auto;cursor:pointer;margin-top:18px;
    font-family:'Mochiy Pop One',sans-serif;font-size:clamp(20px,4.5vw,30px);
    color:#fff;background:linear-gradient(180deg,#ffa253,#ff7a1e);
    border:3px solid var(--ink);border-radius:999px;padding:14px 46px;
    box-shadow:0 6px 0 var(--ink), 0 12px 22px rgba(74,44,23,.35);
    transition:transform .08s, box-shadow .08s;
  }
  .btn:active{transform:translateY(5px);box-shadow:0 1px 0 var(--ink);}
  .best{margin-top:16px;font-weight:900;font-size:clamp(13px,2.8vw,16px);color:#6b4a2c;}
  .trophy-mini{font-size:clamp(15px,3vw,18px);margin-top:6px;font-weight:900;color:#a87900;}
  .goldemoji{filter:sepia(1) saturate(4) hue-rotate(-18deg) brightness(1.25) drop-shadow(0 0 12px rgba(245,197,24,.9));}

  #over{background:rgba(74,44,23,.45);backdrop-filter:blur(3px);}
  #over .panel,#trophy .panel{
    background:var(--cream);border:3px solid var(--ink);border-radius:28px;
    padding:34px 44px;box-shadow:0 10px 0 rgba(74,44,23,.5), 0 24px 50px rgba(0,0,0,.35);
    transform:rotate(-1deg);max-width:92vw;
  }
  .overtitle{font-family:'Mochiy Pop One',sans-serif;font-size:clamp(30px,7vw,52px);color:#d34f2e;
    text-shadow:0 3px 0 var(--ink);transform:rotate(-2deg);}
  .score{font-family:'Mochiy Pop One',sans-serif;font-size:clamp(40px,9vw,72px);color:#a4652f;margin:8px 0 0;
    text-shadow:0 3px 0 var(--ink);}
  .score small{font-size:.4em;}

  #trophy{background:rgba(40,25,5,.55);backdrop-filter:blur(4px);}
  #trophy .panel{background:linear-gradient(165deg,#fff8dc,#ffe9a0 60%,#ffd75e);}
  .trophytitle{font-family:'Mochiy Pop One',sans-serif;font-size:clamp(26px,6vw,44px);color:#a87900;
    text-shadow:0 2px 0 #fff, 0 4px 0 rgba(120,80,0,.4);}
  .goldpoop{font-size:clamp(80px,22vw,150px);line-height:1.1;display:block;margin:8px 0;
    animation:shine 2.2s ease-in-out infinite;}
  @keyframes shine{0%,100%{transform:scale(1) rotate(-3deg);}50%{transform:scale(1.07) rotate(3deg);}}
  .confetti{position:absolute;top:-12px;font-size:22px;animation:fall linear infinite;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}

  .hint{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);font-weight:900;
    font-size:clamp(12px,2.6vw,15px);color:#fff;text-shadow:0 2px 0 var(--ink);
    pointer-events:none;opacity:.95;animation:bounce 1.4s ease-in-out infinite;z-index:5;display:none;}
  @keyframes bounce{0%,100%{transform:translate(-50%,0);}50%{transform:translate(-50%,-7px);}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="lives"></div>
  <div id="count">0<small>こ</small></div>
  <div id="tier">うんこ</div>
  <div id="windbox">
    <div class="lbl">かぜ</div>
    <div id="windarrow">─</div>
    <div id="windbar"><div id="windfill"></div></div>
  </div>
  <div id="nextwrap">
    <div id="nextbar"><div id="nextfill"></div></div>
    <div id="nextlbl">いろチェンジまで あと100こ</div>
  </div>
  <div id="balwrap">
    <div class="lbl">バランス</div>
    <div id="balbar"><div id="baldot"></div></div>
  </div>
  <div id="toast"></div>
</div>

<div class="hint" id="hint">タップで おとす！</div>
<button id="mute" title="サウンド">🔊</button>

<div id="title" class="ov">
  <div class="bigtitle">うんこ<br>タワー<span class="y2">〜 めざせ 1000だん 〜</span></div>
  <div class="subtitle">💩 バランスよく つみあげろ！ 💩</div>
  <div class="rules">
    タップ / スペースキーで うんこを落とす<br>
    100こ ごとに うんこが しんかする！<br>
    高くなるほど 風がふいて グラグラ…
  </div>
  <button class="btn" id="startbtn">スタート！</button>
  <div class="best" id="titlebest"></div>
  <div class="trophy-mini hidden" id="titletrophy">🏆 ゴールデンうんこ かくとくずみ <span class="goldemoji">💩</span></div>
</div>

<div id="over" class="ov hidden">
  <div class="panel">
    <div class="overtitle" id="overtitle">どしゃー！！</div>
    <div class="score"><span id="overcount">0</span><small> こ</small></div>
    <div class="best" id="overbest"></div>
    <div class="best" id="overtier"></div>
    <button class="btn" id="retrybtn">もういっかい！</button>
  </div>
</div>

<div id="trophy" class="ov hidden">
  <div class="panel">
    <div class="trophytitle">🏆 でんせつたっせい 🏆</div>
    <span class="goldpoop goldemoji">💩</span>
    <div class="trophytitle" style="font-size:clamp(20px,4.5vw,30px)">ゴールデンうんこ<br>トロフィー かくとく！！</div>
    <div class="best">1000こ つみあげた きみは うんこの かみさま</div>
    <button class="btn" id="contbtn">つみつづける</button>
  </div>
</div>

<script>
'use strict';
/* ================= うんこタワー ================= */
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W=0, H=0, DPR=1;
function resize(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize); resize();

/* ---------- tiers (100こごとに進化) ---------- */
const TIERS = [
  {name:'うんこ',           c:'#9b6b3f'},
  {name:'まっちゃうんこ',   c:'#7daa3c'},
  {name:'ソーダうんこ',     c:'#3fa7d6'},
  {name:'さくらうんこ',     c:'#f48fb1'},
  {name:'マグマうんこ',     c:'#e25822'},
  {name:'どくうんこ',       c:'#8e44ad'},
  {name:'ゆきうんこ',       c:'#e8ecf1'},
  {name:'やみうんこ',       c:'#46394f'},
  {name:'にじうんこ',       c:'rainbow'},
  {name:'プラチナうんこ',   c:'#c3ccd6'},
  {name:'ゴールデンうんこ', c:'#f5c518'},
];
function hexMix(hex, t, to){ // to: 0=black 1=white
  const n=parseInt(hex.slice(1),16);
  let r=n>>16, g=(n>>8)&255, b=n&255;
  const T = to? 255:0;
  r=Math.round(r+(T-r)*t); g=Math.round(g+(T-g)*t); b=Math.round(b+(T-b)*t);
  return `rgb(${r},${g},${b})`;
}
function tierColors(tier, idx, t){
  const def = TIERS[Math.min(tier, TIERS.length-1)];
  if(def.c==='rainbow'){
    const h=(idx*24 + t*50)%360;
    return {base:`hsl(${h},72%,56%)`, dark:`hsl(${h},72%,34%)`, light:`hsl(${h},80%,76%)`};
  }
  if(tier>=10){ // golden
    return {base:'#f5c518', dark:'#a87900', light:'#fff3b0'};
  }
  return {base:def.c, dark:hexMix(def.c,.45,0), light:hexMix(def.c,.45,1)};
}

/* ---------- sound (tiny synth) ---------- */
let AC=null, muted=false;
function ac(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended')AC.resume(); return AC; }
function beep(f, dur=0.1, type='square', vol=0.12, slide=0){
  if(muted) return;
  try{
    const a=ac(), o=a.createOscillator(), g=a.createGain();
    o.type=type; o.frequency.setValueAtTime(f, a.currentTime);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide), a.currentTime+dur);
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+dur);
    o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime+dur+0.02);
  }catch(e){}
}
const S = {
  land   : ()=>beep(170,.09,'square',.13,-60),
  perfect: ()=>{beep(660,.09,'sine',.15); setTimeout(()=>beep(990,.12,'sine',.13),70);},
  miss   : ()=>beep(160,.3,'sawtooth',.14,-120),
  level  : ()=>{[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.12,'triangle',.14),i*90));},
  topple : ()=>beep(90,.6,'sawtooth',.18,-60),
  trophy : ()=>{[523,659,784,1046,1318,1568].forEach((f,i)=>setTimeout(()=>beep(f,.18,'triangle',.15),i*120));},
};
document.getElementById('mute').addEventListener('click', e=>{
  muted=!muted; e.target.textContent = muted?'🔇':'🔊'; e.stopPropagation();
});

/* ---------- game state ---------- */
const PW = 92;          // poop width
const PH = 34;          // vertical spacing per poop
const BAL_LIMIT = 26;   // lean limit before topple
const G = {
  state:'title',        // title | play | topple | over | trophy
  stack:[],             // {x, tier}
  falling:null,         // {x,y,vx,vy,rot}
  count:0, lives:3,
  inst:0,               // instability (lean)
  wind:0, windTarget:0, windTimer:0,
  camY:0, camX:0,
  t:0,
  dropPhase:0,
  parts:[],             // particles (topple / confetti)
  shake:0,
  faceTimer:0,
  best:+(localStorage.getItem('unkoBest')||0),
  gold:localStorage.getItem('unkoGold')==='1',
  trophyShown:false,
};

/* ---------- HUD refs ---------- */
const $ = id=>document.getElementById(id);
const hud=$('hud'), elCount=$('count'), elTier=$('tier'), elLives=$('lives'),
  elWindArrow=$('windarrow'), elWindFill=$('windfill'), elBalDot=$('baldot'),
  elNextFill=$('nextfill'), elNextLbl=$('nextlbl'), elToast=$('toast'), elHint=$('hint');

function toast(msg, color){
  elToast.textContent=msg;
  if(color) elToast.style.color=color; else elToast.style.color='#fff';
  elToast.classList.remove('pop'); void elToast.offsetWidth; elToast.classList.add('pop');
}
function updateHUD(){
  elCount.innerHTML = G.count + '<small>こ</small>';
  const tier = Math.min(Math.floor(G.count/100), TIERS.length-1);
  elTier.textContent = TIERS[tier].name;
  elLives.innerHTML = [0,1,2].map(i=>`<span class="${i<G.lives?'':'lost'}">💩</span>`).join('');
  const toNext = G.count>=1000 ? 0 : 100-(G.count%100);
  elNextFill.style.width = (G.count>=1000?100:(G.count%100))+'%';
  elNextLbl.textContent = G.count>=1000 ? 'ゴールデンモード！' : (G.count>=900? `トロフィーまで あと${1000-G.count}こ` : `いろチェンジまで あと${toNext}こ`);
  // balance dot
  const p = Math.max(-1, Math.min(1, G.inst/BAL_LIMIT));
  elBalDot.style.left = `calc(50% + ${p*46}% - 7px)`;
  elBalDot.style.background = Math.abs(p)>0.72 ? '#d8432e' : Math.abs(p)>0.45 ? '#f0a322' : '#5cb85c';
}

/* ---------- difficulty ---------- */
function windMax(){ const c=G.count; if(c<15) return 0; return Math.min(1, (c-15)/220) * (0.4 + Math.min(0.6, c/900)); }
function swayAmp(){ return Math.min(42, 2 + G.count*0.12) + Math.abs(G.wind)*26; }
function swaySpeed(){ return 0.9 + Math.min(1.7, G.count/240); }
function dropSpeed(){ return 1.25 + Math.min(2.3, G.count/170); }
function dropRange(){ return Math.min(W*0.32, 120 + G.count*0.4); }

/* ---------- coordinates ----------
   world: y up from ground(0). screen: screenY = H*0.8 - (wy - camY) */
function sy(wy){ return H*0.8 - (wy - G.camY); }
function sx(wx){ return W/2 + (wx - G.camX); }
function topWorldY(){ return G.stack.length*PH; }
function swayAt(i){
  const n = Math.max(1,G.stack.length);
  const f = Math.pow(i/n, 1.4);
  return Math.sin(G.t*swaySpeed() + i*0.07)*swayAmp()*f + G.inst*2.2*f;
}
function effX(i){ return G.stack[i].x + swayAt(i+1); }
function topEffX(){ return G.stack.length? effX(G.stack.length-1) : 0; }

/* ---------- core actions ---------- */
function reset(){
  G.stack=[{x:0,tier:0}]; G.count=1; G.lives=3; G.inst=0;
  G.wind=0; G.windTarget=0; G.windTimer=0;
  G.camY=0; G.camX=0; G.falling=null; G.parts=[]; G.shake=0;
  G.dropPhase=Math.random()*6; G.trophyShown=false;
  updateHUD();
}
function startGame(){
  reset();
  G.state='play';
  $('title').classList.add('hidden'); $('over').classList.add('hidden'); $('trophy').classList.add('hidden');
  hud.style.display='block'; elHint.style.display='block';
  setTimeout(()=>elHint.style.display='none', 3500);
}
function dropperX(){ return G.camX + Math.sin(G.t*dropSpeed()+G.dropPhase)*dropRange(); }

function doDrop(){
  if(G.state!=='play' || G.falling) return;
  const tier = Math.min(Math.floor(G.count/100), TIERS.length-1);
  G.falling = { x:dropperX(), y:topWorldY()+300, vx:0, vy:0, rot:(Math.random()-.5)*0.2, tier };
  beep(420,.06,'sine',.08,180);
}

function land(offset){ // offset px from top center — also exposed for tests
  const W2 = PW*0.46;
  if(Math.abs(offset) > W2){ return miss(); }
  const perfect = Math.abs(offset) < PW*0.13;
  const topX = G.stack[G.stack.length-1].x;
  const tier = Math.min(Math.floor(G.count/100), TIERS.length-1);
  G.stack.push({x: topX + offset*0.92, tier});
  G.count++;
  G.inst += (offset/PW)*13;
  if(perfect){
    G.inst *= 0.45;
    toast(['ピタッ！','ナイス💩！','うますぎ！','てんさい！'][Math.floor(Math.random()*4)], '#ffe24a');
    S.perfect();
  } else {
    S.land();
  }
  // milestone
  if(G.count%100===0 && G.count<1000){
    const t2 = Math.min(Math.floor(G.count/100), TIERS.length-1);
    toast(`✨ ${TIERS[t2].name} に しんか！ ✨`);
    S.level(); G.shake=8;
  }
  if(G.count>=1000 && !G.trophyShown){
    G.trophyShown=true;
    G.gold=true; localStorage.setItem('unkoGold','1');
    winTrophy();
  }
  if(Math.abs(G.inst) > BAL_LIMIT){ topple(); }
  saveBest(); updateHUD();
}
function miss(){
  G.lives--;
  S.miss(); G.shake=10;
  toast('あぶない！','#ff6b5e');
  // falling poop tumbles away as particle
  if(G.falling){
    G.parts.push({x:G.falling.x, y:G.falling.y, vx:(G.falling.x>topEffX()?1:-1)*(120+Math.random()*120), vy:160, rot:0, vr:(Math.random()-.5)*9, tier:G.falling.tier, life:2});
  }
  updateHUD();
  if(G.lives<=0){ topple(); }
}
function topple(){
  if(G.state!=='play') return;
  G.state='topple'; S.topple(); G.shake=16;
  const n=G.stack.length;
  const burst=Math.min(16,n);
  for(let i=n-burst;i<n;i++){
    const p=G.stack[i];
    G.parts.push({x:p.x+swayAt(i+1), y:i*PH, vx:(Math.random()-.5)*420 + G.inst*9, vy:120+Math.random()*260, rot:0, vr:(Math.random()-.5)*12, tier:p.tier, life:2.2});
  }
  G.stack.length = Math.max(0, n-burst);
  setTimeout(showOver, 1500);
}
function saveBest(){ if(G.count>G.best){ G.best=G.count; localStorage.setItem('unkoBest',G.best); } }
function showOver(){
  G.state='over'; saveBest();
  $('overcount').textContent=G.count;
  $('overbest').textContent=`さいこうきろく：${G.best}こ`;
  const tier = Math.min(Math.floor(G.count/100), TIERS.length-1);
  $('overtier').textContent=`とうたつ：${TIERS[tier].name}`;
  $('overtitle').textContent = G.count>=500?'おしい〜！！':'どしゃー！！';
  $('over').classList.remove('hidden');
}
function winTrophy(){
  G.state='trophy'; saveBest(); S.trophy();
  const ov=$('trophy');
  // confetti
  for(let i=0;i<24;i++){
    const sp=document.createElement('span');
    sp.className='confetti'; sp.textContent=['✨','🎉','💛','⭐','💩'][i%5];
    sp.style.left=(Math.random()*100)+'vw';
    sp.style.animationDuration=(2.5+Math.random()*3)+'s';
    sp.style.animationDelay=(Math.random()*2)+'s';
    ov.appendChild(sp);
  }
  ov.classList.remove('hidden');
}

/* ---------- drawing ---------- */
function drawPoop(x, y, w, cols, opts={}){
  // y = bottom center, draws swirl poop of width w
  const {face=false, mood='happy', rot=0} = opts;
  ctx.save(); ctx.translate(x,y); if(rot) ctx.rotate(rot);
  ctx.lineWidth = Math.max(2, w*0.04);
  ctx.strokeStyle = cols.dark;
  const layers=[
    {rx:w*0.50, ry:w*0.205, cy:-w*0.155},
    {rx:w*0.375,ry:w*0.175, cy:-w*0.40},
    {rx:w*0.26, ry:w*0.14,  cy:-w*0.60},
  ];
  for(const L of layers){
    ctx.beginPath(); ctx.ellipse(0,L.cy,L.rx,L.ry,0,0,Math.PI*2);
    ctx.fillStyle=cols.base; ctx.fill(); ctx.stroke();
    // highlight
    ctx.beginPath(); ctx.ellipse(-L.rx*0.42, L.cy-L.ry*0.32, L.rx*0.28, L.ry*0.3, -0.4, 0, Math.PI*2);
    ctx.fillStyle=cols.light; ctx.globalAlpha=.55; ctx.fill(); ctx.globalAlpha=1;
  }
  // tip curl
  ctx.beginPath();
  ctx.moveTo(-w*0.08, -w*0.70);
  ctx.quadraticCurveTo(-w*0.02, -w*0.86, w*0.10, -w*0.78);
  ctx.quadraticCurveTo(w*0.16, -w*0.73, w*0.06, -w*0.68);
  ctx.closePath(); ctx.fillStyle=cols.base; ctx.fill(); ctx.stroke();
  if(face){
    const ey=-w*0.40;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(-w*0.13,ey,w*0.075,w*0.085,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse( w*0.13,ey,w*0.075,w*0.085,0,0,7); ctx.fill();
    ctx.fillStyle='#3a2412';
    const px = mood==='worried'? Math.sin(G.t*9)*w*0.02 : 0;
    ctx.beginPath(); ctx.arc(-w*0.13+px,ey+w*0.012,w*0.035,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc( w*0.13+px,ey+w*0.012,w*0.035,0,7); ctx.fill();
    ctx.strokeStyle='#3a2412'; ctx.lineWidth=Math.max(1.5,w*0.025); ctx.lineCap='round';
    ctx.beginPath();
    if(mood==='worried'){ ctx.arc(0,ey+w*0.20,w*0.07,Math.PI*1.15,Math.PI*1.85); }
    else { ctx.arc(0,ey+w*0.10,w*0.09,Math.PI*0.15,Math.PI*0.85); }
    ctx.stroke();
    // cheeks
    ctx.fillStyle='rgba(255,120,120,.35)';
    ctx.beginPath(); ctx.ellipse(-w*0.25,ey+w*0.09,w*0.05,w*0.03,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse( w*0.25,ey+w*0.09,w*0.05,w*0.03,0,0,7); ctx.fill();
  }
  ctx.restore();
}

/* sky palette keyframes by altitude */
const SKY=[
  {a:0,     top:[174,227,255], bot:[255,233,199]},
  {a:5000,  top:[255,166,128], bot:[255,224,170]},
  {a:12000, top:[58,52,110],   bot:[150,110,160]},
  {a:24000, top:[8,8,30],      bot:[40,35,80]},
];
function lerpC(a,b,t){ return a.map((v,i)=>Math.round(v+(b[i]-v)*t)); }
function skyColors(alt){
  let i=0; while(i<SKY.length-2 && alt>SKY[i+1].a) i++;
  const k0=SKY[i],k1=SKY[i+1];
  const t=Math.max(0,Math.min(1,(alt-k0.a)/(k1.a-k0.a)));
  return {top:lerpC(k0.top,k1.top,t), bot:lerpC(k0.bot,k1.bot,t), night:Math.max(0,Math.min(1,(alt-9000)/8000))};
}
// deterministic stars
const STARS=[]; (function(){ let s=42; const r=()=>{s=(s*16807)%2147483647; return s/2147483647;};
  for(let i=0;i<90;i++) STARS.push({x:r(), y:r(), tw:r()*6, sz:1+r()*1.6}); })();
const CLOUDS=[]; for(let i=0;i<6;i++) CLOUDS.push({x:Math.random()*1.2-0.1, yy:Math.random(), s:0.6+Math.random()*0.8, drift:Math.random()*20+8});

function draw(dt){
  const alt = topWorldY();
  const sk = skyColors(alt);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,`rgb(${sk.top.join(',')})`); g.addColorStop(1,`rgb(${sk.bot.join(',')})`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  ctx.save();
  if(G.shake>0){ ctx.translate((Math.random()-.5)*G.shake,(Math.random()-.5)*G.shake); G.shake*=0.88; if(G.shake<0.4)G.shake=0; }

  // stars
  if(sk.night>0.05){
    ctx.fillStyle='#fff';
    for(const st of STARS){
      const a = sk.night*(0.4+0.6*Math.abs(Math.sin(G.t*1.5+st.tw)));
      ctx.globalAlpha=a; ctx.fillRect(st.x*W, st.y*H*0.8, st.sz, st.sz);
    }
    ctx.globalAlpha=1;
  }
  // clouds drift with wind
  for(const cl of CLOUDS){
    cl.x += (G.wind*60 + cl.drift*0.15)*dt/W;
    if(cl.x>1.25) cl.x=-0.25; if(cl.x<-0.25) cl.x=1.25;
    const cy = (cl.yy*H*0.7 + (G.camY*0.18))%(H+120)-60;
    ctx.globalAlpha=0.75*(1-sk.night*0.8);
    ctx.fillStyle='#fff';
    const cx=cl.x*W, s=cl.s;
    ctx.beginPath();
    ctx.ellipse(cx,cy,55*s,20*s,0,0,7); ctx.ellipse(cx+35*s,cy+6*s,38*s,16*s,0,0,7);
    ctx.ellipse(cx-38*s,cy+7*s,34*s,14*s,0,0,7); ctx.fill();
    ctx.globalAlpha=1;
  }

  // ground
  const gy = sy(0);
  if(gy < H+60){
    ctx.fillStyle='#8bc34a'; ctx.fillRect(0,gy,W,H-gy+10);
    ctx.fillStyle='#6da33b'; ctx.fillRect(0,gy,W,8);
    ctx.fillStyle='#7b5a3a'; ctx.fillRect(0,gy+34,W,H);
  }

  // tower
  const n=G.stack.length;
  const first = Math.max(0, Math.floor((G.camY-(H*0.25))/PH));
  for(let i=first;i<n;i++){
    const p=G.stack[i];
    const x=sx(p.x + swayAt(i+1));
    const y=sy(i*PH);
    if(y<-80) break;
    const cols=tierColors(p.tier, i, G.t);
    drawPoop(x, y, PW, cols, {face: i===n-1 && !G.falling, mood:'happy'});
  }

  if(G.state==='play'){
    // dropper / falling
    const topY = topWorldY();
    if(G.falling){
      const f=G.falling;
      const cols=tierColors(f.tier, n, G.t);
      // guide line
      ctx.setLineDash([6,8]); ctx.strokeStyle='rgba(74,44,23,.35)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(sx(f.x), sy(f.y)); ctx.lineTo(sx(f.x), sy(topY)); ctx.stroke(); ctx.setLineDash([]);
      drawPoop(sx(f.x), sy(f.y), PW, cols, {face:true, mood:'worried', rot:f.rot});
    } else {
      const dx=dropperX();
      const dWY = topY + Math.min(300, Math.max(160, sy(topY) - 90));
      const cols=tierColors(Math.min(Math.floor(G.count/100),TIERS.length-1), n, G.t);
      // guide
      ctx.setLineDash([4,10]); ctx.strokeStyle='rgba(74,44,23,.22)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(sx(dx), sy(dWY)); ctx.lineTo(sx(dx), sy(topY)); ctx.stroke(); ctx.setLineDash([]);
      // target marker on top
      ctx.strokeStyle='rgba(255,255,255,.5)';
      ctx.beginPath(); ctx.moveTo(sx(topEffX())-PW*0.46, sy(topY)-2); ctx.lineTo(sx(topEffX())+PW*0.46, sy(topY)-2); ctx.stroke();
      drawPoop(sx(dx), sy(dWY), PW, cols, {face:true, mood:'happy', rot:Math.sin(G.t*3)*0.06});
      // hanging string
      ctx.strokeStyle='rgba(74,44,23,.4)'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(sx(dx), sy(dWY)-PW*0.8); ctx.lineTo(sx(dx), -10); ctx.stroke();
    }
    // wind streaks
    const wmag=Math.abs(G.wind);
    if(wmag>0.05){
      ctx.strokeStyle=`rgba(255,255,255,${0.25+wmag*0.4})`; ctx.lineWidth=2; ctx.lineCap='round';
      for(let i=0;i<7;i++){
        const yy=(i*97 + (G.t*40)%97)%H;
        const xx=( (i*173 + G.t*(140+260*wmag)*Math.sign(G.wind))%(W+160) +W+160)%(W+160)-80;
        ctx.beginPath(); ctx.moveTo(xx,yy); ctx.quadraticCurveTo(xx+30*Math.sign(G.wind),yy-4, xx+60*Math.sign(G.wind),yy);
        ctx.stroke();
      }
    }
  }

  // particles
  for(const p of G.parts){
    const cols=tierColors(p.tier,0,G.t);
    drawPoop(sx(p.x), sy(p.y), PW*0.95, cols, {rot:p.rot, face:true, mood:'worried'});
  }
  ctx.restore();
}

/* ---------- update ---------- */
let last=performance.now();
function frame(now){
  const dt=Math.min(0.033,(now-last)/1000); last=now;
  G.t += dt;

  if(G.state==='play' || G.state==='topple'){
    // wind gusts
    G.windTimer -= dt;
    if(G.windTimer<=0){
      G.windTimer = 1.8 + Math.random()*2.5;
      const m=windMax();
      G.windTarget = (Math.random()*2-1)*m;
      if(m>0.3 && Math.random()<0.4) G.windTarget = Math.sign(G.windTarget)*m; // full gust
    }
    G.wind += (G.windTarget-G.wind)*Math.min(1,dt*1.2);
    // wind HUD
    const wm=Math.max(0.0001,windMax());
    const wp=G.wind; // -1..1
    elWindArrow.textContent = Math.abs(wp)<0.04?'─': (wp>0?'→':'←').repeat(Math.min(3,Math.ceil(Math.abs(wp)*3.2)));
    const pct=Math.min(50,Math.abs(wp)*50/Math.max(0.35,1));
    elWindFill.style.left = wp>0? '50%' : (50-Math.abs(wp)*50)+'%';
    elWindFill.style.width = (Math.abs(wp)*50)+'%';
    elWindFill.style.background = Math.abs(wp)>0.55?'#d8432e':'#3fa7d6';

    // instability slow decay
    G.inst *= (1 - dt*0.05);

    // falling physics
    if(G.falling){
      const f=G.falling;
      f.vy -= 1500*dt;            // gravity (world y up)
      f.vx += G.wind*430*dt;      // wind push
      f.x += f.vx*dt; f.y += f.vy*dt;
      f.rot = f.vx*0.0006;
      const restY = topWorldY();
      if(f.y <= restY){
        const offset = f.x - topEffX();
        G.falling=null;
        land(offset);
      } else if (f.y < G.camY - 200){
        G.falling=null; miss();
      }
    }
    // balance dot live update
    if(!G.falling && G.state==='play' && (G.t*60|0)%6===0) updateHUD();

    // camera
    const targetY = Math.max(0, topWorldY() - H*0.35);
    G.camY += (targetY-G.camY)*Math.min(1,dt*4);
    const tx = G.stack.length? G.stack[G.stack.length-1].x : 0;
    G.camX += (tx-G.camX)*Math.min(1,dt*2);
  }

  // particles
  for(const p of G.parts){
    p.vy -= 1400*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.rot+=p.vr*dt; p.life-=dt;
  }
  G.parts = G.parts.filter(p=>p.life>0 && sy(p.y)<H+150);

  draw(dt);
}
function loop(now){ frame(now); requestAnimationFrame(loop); }
// fallback: rAF and page timers freeze in hidden/embedded webviews, but
// dedicated-worker timers don't — let a worker drive frames when rAF stalls
try{
  const wURL = URL.createObjectURL(new Blob(['setInterval(()=>postMessage(0),33)'],{type:'text/javascript'}));
  const wk = new Worker(wURL);
  wk.onmessage = ()=>{ const now=performance.now(); if(now-last>30) frame(now); };
}catch(e){
  setInterval(()=>{ const now=performance.now(); if(now-last>100) frame(now); }, 50);
}
