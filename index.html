<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>うんこ道 〜めざせ世界一の黄金便〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#5b3a1e;
    --cream:#fff4dd;
    --paper:#fffaf0;
    --accent:#ff914d;
    --accent2:#ffb347;
    --good:#7cc15b;
    --warn:#ff8a5c;
    --gold:#f5c518;
    --pink:#ffb3b3;
    --intestine:#ff9aa9;
    --intestine-d:#e57689;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Zen Maru Gothic','Hiragino Maru Gothic ProN',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 18% 12%, #fff7e6, transparent 45%),
      radial-gradient(circle at 85% 8%, #ffe9c9, transparent 40%),
      linear-gradient(160deg,#ffe6c0 0%, #ffd9a8 55%, #ffcf9a 100%);
    background-attachment:fixed;
    overflow:hidden; user-select:none;-webkit-user-select:none;
    -webkit-text-size-adjust:100%;
  }
  /* phone-shaped centered column */
  #app{
    position:relative;width:100%;max-width:460px;height:100dvh;height:100vh;margin:0 auto;
    display:flex;flex-direction:column;overflow:hidden;
    background:linear-gradient(175deg, #fffdf8, #fff3e0);
    box-shadow:0 0 60px rgba(91,58,30,.22);
  }
  @media(min-width:480px){ #app{border-left:2px solid rgba(91,58,30,.12);border-right:2px solid rgba(91,58,30,.12);} }

  .screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
  .screen.active{display:flex;animation:fadein .35s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* ============ TITLE ============ */
  #screen-title{align-items:center;justify-content:center;text-align:center;padding:30px 24px;}
  .logo{
    font-family:'Mochiy Pop One',sans-serif;line-height:1.04;color:#a4652f;
    font-size:clamp(40px,15vw,64px);
    text-shadow:0 3px 0 #5b3a1e, 0 7px 0 rgba(91,58,30,.18), 0 12px 26px rgba(91,58,30,.35);
    transform:rotate(-3deg);
  }
  .logo .sub{display:block;font-size:.34em;color:#fff;letter-spacing:.12em;margin-top:10px;transform:rotate(1.5deg);
    text-shadow:0 2px 0 #5b3a1e;}
  .title-poop{font-size:clamp(80px,26vw,120px);margin:6px 0 4px;filter:drop-shadow(0 8px 14px rgba(91,58,30,.3));animation:bob 2.4s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-10px) rotate(4deg);}}
  .pitch{font-weight:700;font-size:clamp(13px,3.6vw,15px);line-height:1.9;color:#6b4a2c;margin:18px 0 4px;max-width:320px;}
  .pitch b{color:#c8761f;}
  .best-badge{margin-top:14px;font-weight:900;font-size:13px;color:#a87900;background:#fff5cf;
    border:2px solid #e8c14a;border-radius:999px;padding:6px 16px;box-shadow:0 3px 0 rgba(168,121,0,.25);}
  .btn{
    cursor:pointer;border:none;font-family:'Mochiy Pop One',sans-serif;color:#fff;
    background:linear-gradient(180deg,var(--accent2),var(--accent));
    border:3px solid var(--ink);border-radius:999px;
    box-shadow:0 6px 0 var(--ink), 0 12px 22px rgba(91,58,30,.32);
    transition:transform .08s, box-shadow .08s; -webkit-appearance:none;
  }
  .btn:active{transform:translateY(5px);box-shadow:0 1px 0 var(--ink);}
  .btn.big{font-size:clamp(22px,6vw,28px);padding:15px 50px;margin-top:22px;}
  .btn.ghost{background:#fff;color:var(--ink);box-shadow:0 4px 0 rgba(91,58,30,.4);}
  .btn.sm{font-size:15px;padding:10px 26px;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;}

  /* ============ PLAY ============ */
  .topbar{
    flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
    padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 8px;
  }
  .meal-tag{display:flex;align-items:center;gap:9px;}
  .meal-tag .icon{font-size:26px;}
  .meal-tag .t1{font-family:'Mochiy Pop One',sans-serif;font-size:17px;line-height:1;color:#5b3a1e;}
  .meal-tag .t2{font-size:11px;font-weight:700;color:#9a7a55;margin-top:3px;}
  .dots{display:flex;gap:5px;margin-top:5px;}
  .dots i{width:8px;height:8px;border-radius:50%;background:#e3cfac;}
  .dots i.done{background:var(--good);}
  .dots i.now{background:var(--accent);transform:scale(1.3);}
  .iconbtn{width:38px;height:38px;border-radius:50%;border:2px solid var(--ink);background:rgba(255,255,255,.8);
    font-size:17px;cursor:pointer;box-shadow:0 3px 0 rgba(91,58,30,.28);}

  /* belly scene */
  .scene{flex:0 0 auto;position:relative;display:flex;align-items:center;justify-content:center;padding:4px 0 0;}
  .scene svg{width:min(78%,300px);height:auto;display:block;}
  .gain-pop{position:absolute;font-weight:900;font-size:15px;pointer-events:none;white-space:nowrap;
    text-shadow:0 1px 2px rgba(255,255,255,.8);}
  @keyframes floatup{0%{opacity:0;transform:translateY(6px) scale(.8);}20%{opacity:1;transform:translateY(0) scale(1);}
    100%{opacity:0;transform:translateY(-46px) scale(1);}}
  .grow-comment{text-align:center;font-weight:900;font-size:13px;color:#a4652f;min-height:18px;margin-top:-4px;}

  /* meters */
  .meters{flex:0 0 auto;padding:6px 16px 4px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px 10px;}
  .meter{display:flex;flex-direction:column;gap:3px;}
  .meter .ml{display:flex;justify-content:space-between;font-size:10.5px;font-weight:900;color:#7a5a38;}
  .meter .bar{height:8px;border-radius:99px;background:#ecdcc0;overflow:hidden;}
  .meter .fill{height:100%;width:0%;border-radius:99px;transition:width .4s cubic-bezier(.2,1,.3,1);}
  .meter.good .fill{background:linear-gradient(90deg,#9ad36f,#6bb84a);}
  .meter.warn .fill{background:linear-gradient(90deg,#ffc06b,#ff7a4d);}

  /* menu */
  .menu-wrap{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;
    background:linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,.55));
    border-top-left-radius:26px;border-top-right-radius:26px;margin-top:4px;
    box-shadow:0 -6px 20px rgba(91,58,30,.08);}
  .menu-head{text-align:center;font-family:'Mochiy Pop One',sans-serif;font-size:15px;color:#5b3a1e;padding:12px 0 2px;}
  .menu-head span{font-size:11px;font-weight:700;color:#9a7a55;font-family:'Zen Maru Gothic',sans-serif;}
  .menu{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;
    display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 16px calc(env(safe-area-inset-bottom,0px) + 16px);}
  .food{
    cursor:pointer;background:var(--paper);border:2.5px solid #e6d4b3;border-radius:18px;
    padding:11px 8px 9px;text-align:center;position:relative;transition:transform .1s, box-shadow .1s, border-color .1s;
    box-shadow:0 4px 0 #e3cfac;
  }
  .food:active{transform:translateY(3px);box-shadow:0 1px 0 #e3cfac;}
  .food .emo{font-size:34px;line-height:1;filter:drop-shadow(0 2px 2px rgba(0,0,0,.12));}
  .food .nm{font-weight:900;font-size:13px;margin-top:5px;color:#5b3a1e;}
  .food .tags{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-top:6px;min-height:16px;}
  .tg{font-size:9.5px;font-weight:900;padding:1px 6px;border-radius:99px;line-height:1.5;}
  .tg.g{background:#e4f5d6;color:#4f8f2e;}
  .tg.w{background:#ffe2d3;color:#d2622f;}

  /* ============ DAY INTERIM ============ */
  #screen-day,#screen-final{align-items:center;justify-content:center;text-align:center;padding:28px 22px;overflow-y:auto;}
  .day-title{font-family:'Mochiy Pop One',sans-serif;font-size:22px;color:#a4652f;text-shadow:0 2px 0 #5b3a1e;}
  .toilet{font-size:84px;margin:6px 0;animation:bob 2.2s ease-in-out infinite;}
  .day-poop{margin:6px auto;}
  .verdict{font-family:'Mochiy Pop One',sans-serif;font-size:20px;margin:8px 0 2px;}
  .verdict-sub{font-weight:700;font-size:13px;color:#6b4a2c;line-height:1.8;max-width:300px;margin:0 auto;}

  /* ============ FINAL ============ */
  .final-poop{margin:2px auto 2px;position:relative;}
  .crown{position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:40px;
    filter:drop-shadow(0 3px 4px rgba(180,130,0,.5));animation:bob 2.6s ease-in-out infinite;}
  .rank-title{font-family:'Mochiy Pop One',sans-serif;font-size:clamp(22px,7vw,30px);margin:4px 0 0;}
  .bristol-badge{display:inline-block;font-weight:900;font-size:13px;background:#fff;border:2px solid var(--ink);
    border-radius:999px;padding:5px 16px;margin:8px 0 4px;box-shadow:0 3px 0 rgba(91,58,30,.22);}
  .total{font-family:'Mochiy Pop One',sans-serif;font-size:54px;line-height:1;color:#a4652f;text-shadow:0 3px 0 #5b3a1e;margin-top:6px;}
  .total small{font-size:.34em;color:#9a7a55;}
  .bars{width:100%;max-width:330px;margin:14px auto 4px;display:flex;flex-direction:column;gap:8px;}
  .scbar{display:flex;align-items:center;gap:8px;}
  .scbar .lab{flex:0 0 56px;text-align:right;font-weight:900;font-size:12px;color:#7a5a38;}
  .scbar .track{flex:1;height:13px;border-radius:99px;background:#ecdcc0;overflow:hidden;}
  .scbar .v{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#ffd36b,#ff8a4d);
    transition:width .8s cubic-bezier(.2,1,.3,1);}
  .scbar .num{flex:0 0 30px;text-align:left;font-weight:900;font-size:12px;color:#a4652f;}

  /* ranking */
  .rank-box{width:100%;max-width:340px;margin:16px auto 0;background:#fff;border:3px solid var(--ink);
    border-radius:20px;padding:14px;box-shadow:0 6px 0 rgba(91,58,30,.3);}
  .world{font-family:'Mochiy Pop One',sans-serif;font-size:17px;color:#5b3a1e;line-height:1.4;}
  .world b{color:#d2622f;font-size:1.3em;}
  .world .pct{font-size:12px;font-weight:700;color:#9a7a55;font-family:'Zen Maru Gothic',sans-serif;}
  .lb{margin-top:12px;display:flex;flex-direction:column;gap:4px;}
  .lb .row{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;padding:5px 9px;border-radius:10px;background:#fbf2dd;}
  .lb .row .rk{flex:0 0 30px;font-weight:900;color:#a87900;}
  .lb .row .nm{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb .row .sc{font-weight:900;color:#a4652f;}
  .lb .row.me{background:linear-gradient(90deg,#fff0c2,#ffe39a);border:2px solid #e8c14a;}
  .lb .ellip{text-align:center;color:#c2a888;font-weight:900;letter-spacing:2px;}
  .btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:18px;padding-bottom:10px;}

  .spark{position:absolute;pointer-events:none;font-size:18px;animation:sparkle 1.6s ease-in-out infinite;}
  @keyframes sparkle{0%,100%{opacity:0;transform:scale(.5);}50%{opacity:1;transform:scale(1.1);}}
  .confetti{position:fixed;top:-20px;font-size:20px;animation:fall linear infinite;z-index:50;pointer-events:none;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}

  .eat-flash{position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,.7),transparent 60%);
    opacity:0;pointer-events:none;}
  .eat-flash.go{animation:flash .4s ease;}
  @keyframes flash{0%{opacity:0;}40%{opacity:.9;}100%{opacity:0;}}
</style>
</head>
<body>
<div id="app">

  <!-- TITLE -->
  <section id="screen-title" class="screen active">
    <div class="logo">うんこ道<span class="sub">〜 めざせ 世界一の 黄金便 〜</span></div>
    <div class="title-poop">💩</div>
    <div class="pitch">
      1日3食、食べるものはキミ次第。<br>
      腸の中で <b>うんこを育てて</b>、<br>
      その<b>美しさ</b>で <b>世界ランキング</b>に挑戦！<br>
      めざすは つるんと輝く <b>黄金バナナ便</b>✨
    </div>
    <div class="best-badge" id="bestBadge" style="display:none"></div>
    <button class="btn big" id="startBtn">いただきます！</button>
    <button class="btn sm ghost" id="howBtn" style="margin-top:14px">あそびかた</button>
  </section>

  <!-- PLAY -->
  <section id="screen-play" class="screen">
    <div class="topbar">
      <div class="meal-tag">
        <div class="icon" id="mealIcon">🌅</div>
        <div>
          <div class="t1" id="mealTitle">1日目・朝食</div>
          <div class="t2" id="mealSub">何を食べる？</div>
          <div class="dots" id="dots"></div>
        </div>
      </div>
      <button class="iconbtn" id="muteBtn">🔊</button>
    </div>

    <div class="scene">
      <div id="bellyHolder"></div>
      <div class="eat-flash" id="eatFlash"></div>
    </div>
    <div class="grow-comment" id="growComment">うんこの たね が できた</div>

    <div class="meters" id="meters"></div>

    <div class="menu-wrap">
      <div class="menu-head">メニューをえらぶ <span>（タップで決定）</span></div>
      <div class="menu" id="menu"></div>
    </div>
  </section>

  <!-- DAY INTERIM -->
  <section id="screen-day" class="screen">
    <div class="day-title" id="dayTitle">1日目 おわり</div>
    <div class="toilet">🚽</div>
    <div class="day-poop" id="dayPoop"></div>
    <div class="verdict" id="dayVerdict"></div>
    <div class="verdict-sub" id="dayVerdictSub"></div>
    <button class="btn big" id="nextDayBtn">つぎの日へ</button>
  </section>

  <!-- FINAL -->
  <section id="screen-final" class="screen">
    <div class="day-title">🏁 3日間の せいか 🏁</div>
    <div class="final-poop" id="finalPoop"></div>
    <div class="rank-title" id="rankTitle">健康なバナナ便</div>
    <div class="bristol-badge" id="bristolBadge"></div>
    <div class="total" id="totalScore">0<small>点</small></div>
    <div class="bars" id="finalBars"></div>
    <div class="rank-box">
      <div class="world" id="worldRank"></div>
      <div class="lb" id="leaderboard"></div>
    </div>
    <div class="btns">
      <button class="btn sm" id="shareBtn">結果をシェア</button>
      <button class="btn sm ghost" id="retryBtn">もう一度</button>
    </div>
  </section>

</div>

<script>
'use strict';
const $=id=>document.getElementById(id);
const screens=['title','play','day','final'];
function show(name){ screens.forEach(s=>$('screen-'+s).classList.toggle('active', s===name)); }

/* ---------- sound ---------- */
let AC=null, muted=false;
function ac(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended')AC.resume(); return AC; }
function beep(f,dur=.1,type='sine',vol=.1,slide=0){
  if(muted)return;
  try{const a=ac(),o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(f,a.currentTime);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(40,f+slide),a.currentTime+dur);
  g.gain.setValueAtTime(vol,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+dur);
  o.connect(g).connect(a.destination);o.start();o.stop(a.currentTime+dur+.02);}catch(e){}
}
const SND={
  eat:()=>{beep(520,.07,'triangle',.12);setTimeout(()=>beep(700,.09,'triangle',.1),70);},
  good:()=>{beep(660,.09,'sine',.12);setTimeout(()=>beep(990,.12,'sine',.1),80);},
  bad:()=>beep(200,.22,'sawtooth',.1,-80),
  day:()=>[523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,.12,'triangle',.11),i*90)),
  win:()=>[523,659,784,1046,1318,1568].forEach((f,i)=>setTimeout(()=>beep(f,.18,'triangle',.12),i*110)),
};
$('muteBtn').addEventListener('click',e=>{muted=!muted;e.target.textContent=muted?'🔇':'🔊';});

/* ---------- food data ----------
   stats: fiber 食物繊維 / water 水分 / prob 善玉菌 / fat 脂質 / sugar 糖分 / irrit 刺激
   tags shown to player as hints */
function F(name,emo,s){ return {name,emo,s:Object.assign({fiber:0,water:0,prob:0,fat:0,sugar:0,irrit:0},s)}; }
const MENUS = {
  morning:[
    F('納豆ごはん','🫘',{fiber:2,prob:3}),
    F('ヨーグルト','🥣',{prob:3,water:1,sugar:1}),
    F('バナナ','🍌',{fiber:2,sugar:1,water:1}),
    F('わかめ味噌汁','🍲',{prob:2,water:2,fiber:1}),
    F('焼きたてパン','🥐',{fat:2,sugar:2}),
    F('ベーコンエッグ','🍳',{fat:3,prob:0}),
    F('グラノーラ','🥗',{fiber:2,sugar:2}),
    F('コーヒー','☕',{irrit:2}),
  ],
  noon:[
    F('野菜たっぷり定食','🥗',{fiber:3,water:1,prob:1}),
    F('焼き魚定食','🐟',{prob:1,fiber:1,fat:1,water:1}),
    F('さつまいも','🍠',{fiber:3,sugar:1}),
    F('こってりラーメン','🍜',{fat:3,sugar:1,water:1,irrit:1}),
    F('からあげ弁当','🍗',{fat:3,sugar:1}),
    F('ピザ','🍕',{fat:3,sugar:1}),
    F('激辛カレー','🍛',{irrit:3,fat:1}),
    F('きのこソテー','🍄',{fiber:3}),
  ],
  night:[
    F('湯豆腐と小鉢','🍲',{prob:2,fiber:1,water:2}),
    F('キムチ鍋','🌶️',{prob:2,fiber:2,water:2,irrit:1}),
    F('ひじきと玄米','🌿',{fiber:3,prob:1}),
    F('焼肉ガッツリ','🍖',{fat:3}),
    F('ポテトとビール','🍟',{fat:2,sugar:1,irrit:2,water:1}),
    F('ショートケーキ','🍰',{sugar:3,fat:1}),
    F('チョコアイス','🍦',{sugar:3,fat:1}),
    F('お水ごくごく','💧',{water:3}),
  ],
};
const SLOTS=[
  {key:'morning',icon:'🌅',label:'朝食',sub:'今日の朝ごはんは？'},
  {key:'noon',   icon:'☀️',label:'昼食',sub:'ランチタイム！'},
  {key:'night',  icon:'🌙',label:'夕食',sub:'1日のしめは？'},
];
const STAT_INFO={
  fiber:{n:'食物繊維',cls:'good'}, water:{n:'水分',cls:'good'}, prob:{n:'善玉菌',cls:'good'},
  fat:{n:'脂質',cls:'warn'}, sugar:{n:'糖分',cls:'warn'}, irrit:{n:'刺激物',cls:'warn'},
};

/* ---------- game state ---------- */
const TOTAL_DAYS=3;
let G;
function newGame(){
  G={ day:0, slot:0, mealCount:0,
      sum:{fiber:0,water:0,prob:0,fat:0,sugar:0,irrit:0} };
}
function avg(){ const m=Math.max(1,G.mealCount),a={};for(const k in G.sum)a[k]=G.sum[k]/m;return a; }

/* ---------- result math ---------- */
function computeResult(useCount){
  const m=Math.max(1, useCount!=null?useCount:G.mealCount);
  const a={};for(const k in G.sum)a[k]=G.sum[k]/m;
  const dryness  = Math.max(0,1.6-a.water)*1.3 + Math.max(0,1.4-a.fiber)*1.0;
  const looseness= a.fat*0.7 + a.sugar*0.55 + a.irrit*1.1 + Math.max(0,(a.water-2.6)-a.fiber*0.4)*0.8;
  const net=looseness-dryness;
  const bristol=Math.min(7,Math.max(1, 4+net*1.3));
  const clamp=v=>Math.max(0,Math.min(100,v));
  const shape=clamp(100-Math.abs(bristol-4)*24 - Math.max(0,1.2-a.fiber)*22);
  const color=clamp(60+a.prob*16 - a.fat*10 - a.sugar*12 + a.fiber*4);
  const luster=clamp(55+a.water*16 - Math.abs(bristol-4)*10 - a.fat*6);
  const smell=clamp(70+a.prob*12 - a.fat*14 - a.sugar*10 - a.irrit*12);
  const ease=clamp(70+a.fiber*8 + a.water*8 - Math.abs(bristol-4)*16 - a.irrit*8);
  let total=shape*.25+color*.20+luster*.15+smell*.20+ease*.20;
  total-=Math.max(0,(a.fat+a.sugar)-2)*6;     // 悪玉菌ペナルティ
  total=Math.round(clamp(total));
  return {a,bristol,btype:Math.round(bristol),
          dims:{形:Math.round(shape),色:Math.round(color),ツヤ:Math.round(luster),香り:Math.round(smell),快便:Math.round(ease)},
          total};
}
const BRISTOL=[
  null,
  {n:'コロコロ便',d:'カチカチの便秘…水分と繊維がぜんぜん足りないよ💦'},
  {n:'ゴツゴツ便',d:'かたくて出にくい便秘ぎみ。野菜とお水をもっと！'},
  {n:'ひび割れバナナ',d:'おしい！あと少し水分があればツルッといけた。'},
  {n:'つるんバナナ便',d:'理想形！するっと快便、最高の腸内環境✨'},
  {n:'やわらかバナナ',d:'やや柔らかめ。健康的だけどあと一歩。'},
  {n:'どろどろ軟便',d:'脂質や刺激物が多すぎたかも…お腹ゆるゆる。'},
  {n:'みずみず下痢便',d:'これは大惨事！刺激物と脂で腸が大暴れ🚽'},
];
function rankInfo(total,btype){
  if(total>=90) return {t:'伝説の黄金便',c:'#f5c518',emoji:'👑',crown:true};
  if(total>=80) return {t:'ピカピカ黄金便',c:'#e0a91a',emoji:'✨',crown:true};
  if(total>=70) return {t:'健康なバナナ便',c:'#c8861f',emoji:'🍌',crown:false};
  if(total>=55) return {t:'まあまあ普通便',c:'#b07a3a',emoji:'🙂',crown:false};
  if(total>=40) return {t:'ちょい不調便',c:'#a06a3a',emoji:'😅',crown:false};
  if(btype<=2)  return {t:'コロコロ侯爵',c:'#8a6a40',emoji:'🪨',crown:false};
  if(btype>=6)  return {t:'ゆるゆる将軍',c:'#7d6a45',emoji:'💧',crown:false};
  return {t:'うんこ修行中',c:'#7d6a45',emoji:'💀',crown:false};
}

/* ---------- poop SVG ---------- */
function palette(res){
  const {a,btype,dims}=res;
  if(a.fat+a.sugar>2.3) return {base:'#5d4226',dark:'#3c2a18',light:'#7a5a38'};      // junk dark
  if(btype>=6)          return {base:'#9c7b46',dark:'#6f562f',light:'#bb9a63'};      // muddy
  if(btype<=2)          return {base:'#7a5631',dark:'#543a20',light:'#9b7748'};      // dry dark
  if(dims.色>=72 && dims.ツヤ>=70) return {base:'#c08a2e',dark:'#8f6418',light:'#ecc05a'}; // golden
  return {base:'#9b6b3f',dark:'#6e4a28',light:'#bd8e57'};                            // normal
}
// kawaii swirl poop. opts: pal, mood(0 sad..2 happy), shine, crown, scale, shape
function poopSVG(opts){
  const p=opts.pal, mood=opts.mood==null?2:opts.mood, shine=opts.shine||0, sh=opts.shape||'banana';
  const id='g'+Math.floor((opts.seed||1)*9999);
  const eyeY=58, mouth = mood>=2 ? `M86 ${eyeY+14} Q100 ${eyeY+26} 114 ${eyeY+14}`
            : mood===1 ? `M88 ${eyeY+18} L112 ${eyeY+18}`
            : `M86 ${eyeY+22} Q100 ${eyeY+10} 114 ${eyeY+22}`;
  let body='';
  if(sh==='pebbles'){
    body=`
      <ellipse cx="70" cy="150" rx="26" ry="24" fill="${p.base}" stroke="${p.dark}" stroke-width="4"/>
      <ellipse cx="128" cy="152" rx="24" ry="22" fill="${p.base}" stroke="${p.dark}" stroke-width="4"/>
      <ellipse cx="100" cy="118" rx="30" ry="27" fill="${p.base}" stroke="${p.dark}" stroke-width="4"/>
      <ellipse cx="100" cy="80" rx="34" ry="30" fill="${p.base}" stroke="${p.dark}" stroke-width="4"/>`;
  } else if(sh==='mushy'){
    body=`
      <path d="M40 165 Q100 120 160 165 Q170 185 100 188 Q30 185 40 165Z" fill="${p.base}" stroke="${p.dark}" stroke-width="4"/>
      <ellipse cx="100" cy="118" rx="48" ry="38" fill="${p.base}" stroke="${p.dark}" stroke-width="4"/>
      <ellipse cx="100" cy="74" rx="36" ry="30" fill="${p.base}" stroke="${p.dark}" stroke-width="4"/>
      <ellipse cx="58" cy="178" rx="7" ry="5" fill="${p.light}" opacity=".7"/>
      <ellipse cx="146" cy="176" rx="6" ry="4" fill="${p.light}" opacity=".7"/>`;
  } else {
    // banana / cracked / soft swirl (3 stacked)
    body=`
      <ellipse cx="100" cy="158" rx="60" ry="26" fill="${p.base}" stroke="${p.dark}" stroke-width="4"/>
      <ellipse cx="100" cy="120" rx="46" ry="22" fill="${p.base}" stroke="${p.dark}" stroke-width="4"/>
      <ellipse cx="100" cy="86" rx="33" ry="18" fill="${p.base}" stroke="${p.dark}" stroke-width="4"/>
      <path d="M88 70 Q96 50 112 58 Q122 64 112 74" fill="${p.base}" stroke="${p.dark}" stroke-width="4" stroke-linejoin="round"/>`;
    if(sh==='cracked'){
      body+=`<path d="M78 150 l10 -10 M110 152 l8 -9 M128 124 l9 -7" stroke="${p.dark}" stroke-width="3" stroke-linecap="round" opacity=".5"/>`;
    }
  }
  // highlights
  const hi = `
      <ellipse cx="78" cy="${sh==='pebbles'?70:80}" rx="12" ry="7" fill="${p.light}" opacity=".55"/>
      <ellipse cx="80" cy="${sh==='pebbles'?112:118}" rx="16" ry="8" fill="${p.light}" opacity=".45"/>`;
  // face
  const face=`
      <ellipse cx="86" cy="${eyeY}" rx="7" ry="8.5" fill="#fff"/>
      <ellipse cx="114" cy="${eyeY}" rx="7" ry="8.5" fill="#fff"/>
      <circle cx="${87+(mood<1?-1:0)}" cy="${eyeY+1}" r="3.4" fill="#3a2412"/>
      <circle cx="${115+(mood<1?-1:0)}" cy="${eyeY+1}" r="3.4" fill="#3a2412"/>
      <circle cx="${85}" cy="${eyeY-2}" r="1.4" fill="#fff"/>
      <circle cx="${113}" cy="${eyeY-2}" r="1.4" fill="#fff"/>
      <path d="${mouth}" fill="none" stroke="#3a2412" stroke-width="3.4" stroke-linecap="round"/>
      <ellipse cx="72" cy="${eyeY+9}" rx="6" ry="3.4" fill="#ff9a9a" opacity=".5"/>
      <ellipse cx="128" cy="${eyeY+9}" rx="6" ry="3.4" fill="#ff9a9a" opacity=".5"/>`;
  let extras='';
  if(shine>=1){ extras+=`
      <text x="156" y="56" font-size="22" class="spark" style="animation-delay:.1s">✨</text>
      <text x="26" y="96" font-size="18" class="spark" style="animation-delay:.5s">✨</text>
      <text x="150" y="140" font-size="16" class="spark" style="animation-delay:.9s">⭐</text>`; }
  if(mood<1){ extras+=`<text x="138" y="64" font-size="20">💦</text>`; }
  const crown = opts.crown ? `<text x="100" y="34" font-size="40" text-anchor="middle">👑</text>` : '';
  return `<svg viewBox="0 0 200 200" width="${opts.w||200}" xmlns="http://www.w3.org/2000/svg">
    ${body}${hi}${face}${extras}${crown}</svg>`;
}

/* belly scene with intestine + growing poop */
function bellySVG(growth, res){
  // growth 0..1 ; res for tint
  const sc=0.34+growth*0.62;
  const pal = res?palette(res):{base:'#b98a55',dark:'#8a6238',light:'#d3aa70'};
  const mood = res? (res.total>=70?2:res.total>=45?1:0) : 2;
  const poop = poopSVG({pal,mood,shine:0,shape:'banana',w:150*sc});
  return `
  <svg viewBox="0 0 300 250" width="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="belly" cx="50%" cy="45%" r="60%">
        <stop offset="0%" stop-color="#ffe6d2"/><stop offset="100%" stop-color="#ffcdb0"/>
      </radialGradient>
    </defs>
    <ellipse cx="150" cy="128" rx="135" ry="116" fill="url(#belly)" stroke="#f0b48f" stroke-width="3"/>
    <!-- coiled intestine -->
    <g fill="none" stroke="var(--intestine)" stroke-width="20" stroke-linecap="round" opacity=".9">
      <path d="M60 60 Q150 30 240 60 Q270 110 220 130 Q150 150 90 130 Q45 150 80 195 Q150 225 230 195"/>
    </g>
    <g fill="none" stroke="var(--intestine-d)" stroke-width="20" stroke-linecap="round" opacity=".18">
      <path d="M60 60 Q150 30 240 60 Q270 110 220 130 Q150 150 90 130 Q45 150 80 195 Q150 225 230 195"/>
    </g>
    <!-- the poop, nestled lower center -->
    <g transform="translate(${150-75*sc}, ${118-95*sc})">${poop}</g>
  </svg>`;
}

/* ---------- rendering ---------- */
function renderMeters(){
  const a=avg(), order=['fiber','water','prob','fat','sugar','irrit'];
  $('meters').innerHTML=order.map(k=>{
    const info=STAT_INFO[k];
    const pct=Math.min(100, (a[k]/2.4)*100);
    return `<div class="meter ${info.cls}"><div class="ml"><span>${info.n}</span></div>
      <div class="bar"><div class="fill" style="width:${pct}%"></div></div></div>`;
  }).join('');
}
function renderMenu(){
  const slot=SLOTS[G.slot];
  $('mealIcon').textContent=slot.icon;
  $('mealTitle').textContent=`${G.day+1}日目・${slot.label}`;
  $('mealSub').textContent=slot.sub;
  // dots
  $('dots').innerHTML=Array.from({length:TOTAL_DAYS*3},(_,i)=>{
    const cls=i<G.mealCount?'done':(i===G.mealCount?'now':'');
    return `<i class="${cls}"></i>`;
  }).join('');
  // pick 6 from slot pool (shuffle deterministic-ish by mealCount)
  const pool=MENUS[slot.key].slice();
  for(let i=pool.length-1;i>0;i--){const j=Math.floor((Math.sin((i+1)*(G.mealCount+7))*0.5+0.5)*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const items=pool.slice(0,6);
  $('menu').innerHTML=items.map((f,idx)=>{
    const tags=[];
    if(f.s.fiber>=2)tags.push('<span class="tg g">繊維</span>');
    if(f.s.prob>=2)tags.push('<span class="tg g">善玉菌</span>');
    if(f.s.water>=2)tags.push('<span class="tg g">水分</span>');
    if(f.s.fat>=2)tags.push('<span class="tg w">脂質</span>');
    if(f.s.sugar>=2)tags.push('<span class="tg w">糖分</span>');
    if(f.s.irrit>=2)tags.push('<span class="tg w">刺激</span>');
    return `<div class="food" data-i="${idx}"><div class="emo">${f.emo}</div>
      <div class="nm">${f.name}</div><div class="tags">${tags.join('')}</div></div>`;
  }).join('');
  $('menu').querySelectorAll('.food').forEach(el=>{
    el.addEventListener('click',()=>chooseFood(items[+el.dataset.i]));
  });
  updateBelly();
}
function updateBelly(){
  const growth=G.mealCount/(TOTAL_DAYS*3);
  const res=G.mealCount>0?computeResult():null;
  $('bellyHolder').innerHTML=bellySVG(growth,res);
  if(G.mealCount===0) $('growComment').textContent='うんこの たね が できた';
}
function gainPop(text,color){
  const holder=$('bellyHolder');
  const sp=document.createElement('div');
  sp.className='gain-pop'; sp.textContent=text; sp.style.color=color;
  sp.style.left=(35+Math.random()*30)+'%'; sp.style.top=(20+Math.random()*20)+'%';
  sp.style.animation='floatup 1.3s ease forwards';
  $('bellyHolder').parentElement.appendChild(sp);
  setTimeout(()=>sp.remove(),1300);
}

let busy=false;
function chooseFood(food){
  if(busy)return; busy=true;
  ac(); SND.eat();
  $('eatFlash').classList.remove('go'); void $('eatFlash').offsetWidth; $('eatFlash').classList.add('go');
  // apply
  for(const k in food.s) G.sum[k]+=food.s[k];
  G.mealCount++;
  // floating gains
  const order=['fiber','water','prob','fat','sugar','irrit'];
  let delay=0;
  order.forEach(k=>{ if(food.s[k]>0){ const info=STAT_INFO[k];
    setTimeout(()=>gainPop(`${info.n}+${food.s[k]}`, info.cls==='good'?'#4f8f2e':'#d2622f'),delay); delay+=120; } });
  renderMeters();
  setTimeout(()=>{
    updateBelly();
    const res=computeResult();
    $('growComment').textContent = res.total>=70?'いい感じに育ってる✨':res.total>=45?'まあまあ育ってきた':'うーん、お腹の調子が心配…';
    // advance slot/day
    G.slot++;
    if(G.slot>=3){
      G.slot=0;
      setTimeout(()=>{ busy=false; dayInterim(); },420);
    } else {
      busy=false; renderMenu();
    }
  },420);
}

function dayInterim(){
  const res=computeResult();
  const b=BRISTOL[res.btype];
  $('dayTitle').textContent=`${G.day+1}日目 おわり 🚽`;
  $('dayPoop').innerHTML=poopSVG({pal:palette(res),mood:res.total>=70?2:res.total>=45?1:0,
      shine:res.total>=80?1:0, shape:shapeOf(res.btype), w:150, seed:G.day+1});
  $('dayVerdict').textContent=`今朝のうんこ：${b.n}`;
  $('dayVerdict').style.color = res.total>=70?'#4f8f2e':res.total>=45?'#c8861f':'#d2622f';
  $('dayVerdictSub').textContent=b.d;
  $('nextDayBtn').textContent = G.day+1>=TOTAL_DAYS ? '最終結果を見る' : 'つぎの日へ';
  SND.day();
  show('day');
}
function shapeOf(bt){ return bt<=2?'pebbles':bt===3?'cracked':bt===4?'banana':bt===5?'soft':'mushy'; }

$('nextDayBtn').addEventListener('click',()=>{
  G.day++;
  if(G.day>=TOTAL_DAYS){ finalResult(); }
  else { renderMenu(); show('play'); }
});

/* ---------- final ---------- */
function finalResult(){
  const res=computeResult();
  const ri=rankInfo(res.total,res.btype);
  const b=BRISTOL[res.btype];
  $('finalPoop').innerHTML=(ri.crown?'<div class="crown">👑</div>':'')+
    poopSVG({pal:palette(res),mood:res.total>=70?2:res.total>=45?1:0,
      shine:res.total>=80?1:0, crown:false, shape:shapeOf(res.btype), w:180, seed:99});
  $('rankTitle').textContent=ri.emoji+' '+ri.t;
  $('rankTitle').style.color=ri.c;
  $('bristolBadge').textContent=`ブリストル型：${res.btype} ／ ${b.n}`;
  $('totalScore').innerHTML=res.total+'<small>点</small>';
  // bars
  $('finalBars').innerHTML=Object.entries(res.dims).map(([k,v])=>
    `<div class="scbar"><span class="lab">${k}</span><span class="track"><span class="v" data-v="${v}"></span></span><span class="num">${v}</span></div>`
  ).join('');
  setTimeout(()=>$('finalBars').querySelectorAll('.v').forEach(el=>el.style.width=el.dataset.v+'%'),120);
  // world ranking
  renderRanking(res.total);
  // best
  const best=+(localStorage.getItem('unkodoBest')||0);
  if(res.total>best) localStorage.setItem('unkodoBest',res.total);
  window.__lastResult=res;
  show('final');
  if(res.total>=70){ SND.win(); confetti(); } else SND.day();
}
function renderRanking(total){
  const TOTAL_PLAYERS=2847193;
  const pctTop=Math.max(0.01, Math.pow(1-total/100,1.7)*100); // smaller = better
  let rank=Math.max(1, Math.round(TOTAL_PLAYERS*pctTop/100));
  const fmt=n=>n.toLocaleString('en-US');
  $('worldRank').innerHTML=`🌍 世界 <b>${fmt(rank)}</b> 位<br><span class="pct">${fmt(TOTAL_PLAYERS)}人中　上位 ${pctTop<1?pctTop.toFixed(2):pctTop.toFixed(1)}%</span>`;
  // leaderboard: top fixed funny + player row
  const top=[
    {r:1,nm:'👑 黄金便のカリスマ',sc:99},
    {r:2,nm:'Dr.ウンコロジー',sc:98},
    {r:3,nm:'腸活の鬼',sc:97},
    {r:4,nm:'快便番長',sc:95},
    {r:5,nm:'フローラ女王',sc:93},
  ];
  let html=top.map(t=>`<div class="row"><span class="rk">${t.r}</span><span class="nm">${t.nm}</span><span class="sc">${t.sc}</span></div>`).join('');
  if(rank>6) html+=`<div class="ellip">⋮</div>`;
  html+=`<div class="row me"><span class="rk">${rank<=5?rank:fmt(rank)}</span><span class="nm">🫵 あなた</span><span class="sc">${total}</span></div>`;
  $('leaderboard').innerHTML=html;
}
function confetti(){
  for(let i=0;i<26;i++){const s=document.createElement('span');
    s.className='confetti';s.textContent=['✨','🎉','💛','⭐','💩','🏆'][i%6];
    s.style.left=(Math.random()*100)+'vw';s.style.animationDuration=(2.6+Math.random()*3)+'s';
    s.style.animationDelay=(Math.random()*1.5)+'s';document.body.appendChild(s);
    setTimeout(()=>s.remove(),6500);}
}

$('shareBtn').addEventListener('click',async()=>{
  const r=window.__lastResult; if(!r)return;
  const ri=rankInfo(r.total,r.btype);
  const txt=`【うんこ道】3日間の腸活の結果…\n${ri.emoji}${ri.t}！ ${r.total}点（ブリストル${r.btype}型）\nめざせ世界一の黄金便💩✨`;
  const url=location.href;
  try{
    if(navigator.share){ await navigator.share({title:'うんこ道',text:txt,url}); }
    else { await navigator.clipboard.writeText(txt+'\n'+url); $('shareBtn').textContent='コピーしたよ！'; setTimeout(()=>$('shareBtn').textContent='結果をシェア',1500); }
  }catch(e){}
});
$('retryBtn').addEventListener('click',()=>{ document.querySelectorAll('.confetti').forEach(c=>c.remove()); startGame(); });

/* ---------- title / start ---------- */
function refreshBest(){
  const best=+(localStorage.getItem('unkodoBest')||0);
  if(best>0){ $('bestBadge').style.display='inline-block'; $('bestBadge').textContent=`🏆 自己ベスト：${best}点`; }
}
function startGame(){ ac(); newGame(); renderMeters(); renderMenu(); show('play'); }
$('startBtn').addEventListener('click',startGame);
$('howBtn').addEventListener('click',()=>{
  alert('【あそびかた】\n\n1日3食×3日間、食べるものを選びます。\n\n🌿 食物繊維・💧水分・🦠善玉菌 をバランスよく取ると、つるんとした理想の「黄金バナナ便」に育ちます✨\n\n🍖 脂質・🍰糖分・🌶️刺激物 が多すぎると、コロコロ便や下痢便に…💦\n\n最終的なうんこの美しさ（形・色・ツヤ・香り・快便度）が世界ランキングのスコアになります！');
});

refreshBest();
show('title');

/* expose for tests */
window.__unko={get G(){return G;}, computeResult, startGame, chooseFood, MENUS, finalResult, dayInterim, newGame};
</script>
